server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy /api/* to the FastAPI backend service.
    # This removes the need for CORS configuration on the backend
    # and lets the same image work on localhost and on a remote VM.
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — let React Router (or direct navigation) handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
