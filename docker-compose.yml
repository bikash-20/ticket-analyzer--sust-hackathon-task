services:
  db:
    image: postgres:15
    container_name: ticket-analyzer-db
    environment:
      POSTGRES_DB: ticket_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: ticket-analyzer-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ticket_db
      MODEL_NAME: distilbert-base-uncased-finetuned-sst-2-english
      HF_HOME: /opt/hf-cache
      TRANSFORMERS_OFFLINE: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ticket-analyzer-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
